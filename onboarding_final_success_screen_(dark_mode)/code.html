<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Success - QuizAI Studio</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#256af4",
            "background-light": "#f5f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<!-- Background Dashboard (Blurred) -->
<div class="fixed inset-0 z-0 flex flex-col blur-sm opacity-50 grayscale-[20%] pointer-events-none">
<!-- Top Nav -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-background-dark/50 px-8 py-3">
<div class="flex items-center gap-8">
<div class="flex items-center gap-3 text-primary">
<span class="material-symbols-outlined text-3xl">deployed_code</span>
<h2 class="text-xl font-bold tracking-tight">QuizAI Studio</h2>
</div>
<div class="flex items-center gap-6">
<span class="text-sm font-medium opacity-70">Dashboard</span>
<span class="text-sm font-medium opacity-70">My Quizzes</span>
<span class="text-sm font-medium opacity-70">Students</span>
<span class="text-sm font-medium opacity-70">Library</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="h-10 w-48 bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="size-10 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex gap-6 p-8">
<!-- Sidebar -->
<aside class="w-64 flex flex-col gap-4">
<div class="h-12 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="space-y-2">
<div class="h-10 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-10 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
<div class="h-10 w-full bg-slate-200 dark:bg-slate-800 rounded-lg"></div>
</div>
</aside>
<!-- Content Grid -->
<div class="flex-1 grid grid-cols-3 gap-6">
<div class="col-span-3 h-32 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-48 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-48 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-48 bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</main>
</div>
<!-- Overlay Backing -->
<div class="fixed inset-0 bg-background-dark/60 backdrop-blur-[2px] z-10"></div>
<!-- Onboarding Modal Container -->
<div class="fixed inset-0 z-20 flex items-center justify-center p-4">
<div class="w-full max-w-lg bg-white dark:bg-[#1a2235] rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800/50 flex flex-col overflow-hidden">
<!-- Step Indicator -->
<div class="flex justify-center gap-1.5 pt-6">
<div class="w-8 h-1.5 rounded-full bg-primary"></div>
<div class="w-8 h-1.5 rounded-full bg-primary"></div>
<div class="w-8 h-1.5 rounded-full bg-primary"></div>
</div>
<!-- Celebratory Icon Section -->
<div class="flex flex-col items-center pt-8 pb-4 text-center px-8">
<div class="relative mb-6">
<!-- Aura/Glow -->
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full scale-150"></div>
<div class="relative bg-primary/10 dark:bg-primary/20 p-5 rounded-full border border-primary/30">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 1;">celebration</span>
</div>
<!-- Sparkles -->
<span class="material-symbols-outlined absolute -top-2 -right-2 text-yellow-400 text-2xl animate-pulse">auto_awesome</span>
<span class="material-symbols-outlined absolute bottom-0 -left-4 text-yellow-500 text-xl">colors_spark</span>
</div>
<h2 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">You're all set!</h2>
<p class="text-slate-600 dark:text-slate-400 text-base max-w-sm">
          Your Google Classroom is synced and your workspace is ready. What would you like to do first?
        </p>
</div>
<!-- Action Items List -->
<div class="px-8 pb-8 space-y-3">
<!-- Action 1: Recommended -->
<button class="w-full group flex items-center gap-4 p-4 bg-primary/5 hover:bg-primary/10 dark:bg-primary/10 dark:hover:bg-primary/20 border border-primary/20 rounded-lg text-left transition-all">
<div class="flex size-12 items-center justify-center rounded-lg bg-primary text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">auto_fix_high</span>
</div>
<div class="flex-1">
<div class="flex items-center gap-2">
<p class="font-semibold text-slate-900 dark:text-white">Create your first AI Quiz</p>
<span class="text-[10px] font-bold uppercase tracking-wider bg-primary/20 text-primary px-1.5 py-0.5 rounded">Recommended</span>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400">Generate questions from any topic in seconds.</p>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">chevron_right</span>
</button>
<!-- Action 2 -->
<button class="w-full group flex items-center gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 border border-slate-100 dark:border-slate-800 rounded-lg text-left transition-all">
<div class="flex size-12 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">person_add</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-white">Invite Students</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Send join links to your Google Classroom rosters.</p>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-100 transition-colors">chevron_right</span>
</button>
<!-- Action 3 -->
<button class="w-full group flex items-center gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 border border-slate-100 dark:border-slate-800 rounded-lg text-left transition-all">
<div class="flex size-12 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">play_circle</span>
</div>
<div class="flex-1">
<p class="font-semibold text-slate-900 dark:text-white">Watch a 1-min Tutorial</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Quickly learn how to navigate your new dashboard.</p>
</div>
<span class="material-symbols-outlined text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-100 transition-colors">chevron_right</span>
</button>
</div>
<!-- Footer CTA -->
<div class="px-8 pb-8 pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
          Go to my Dashboard
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Abstract UI Decorations -->
<div class="fixed top-0 right-0 p-12 opacity-20 pointer-events-none overflow-hidden">
<div class="w-64 h-64 bg-primary blur-[100px] rounded-full"></div>
</div>
<div class="fixed bottom-0 left-0 p-12 opacity-10 pointer-events-none overflow-hidden">
<div class="w-96 h-96 bg-primary blur-[120px] rounded-full"></div>
</div>
</body></html>
