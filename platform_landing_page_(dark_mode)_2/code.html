<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuizAI | Login &amp; Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "accent-purple": "#a855f7",
                        "background-dark": "#0b0f1a",
                        "card-dark": "#1e293b",
                        "input-dark": "#0f172a"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
        .bg-mesh {
            background-color: #0b0f1a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 106, 244, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 106, 244, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
        }
        .geometric-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<div class="geometric-shape w-96 h-96 bg-primary top-[-10%] left-[-10%] rounded-full"></div>
<div class="geometric-shape w-[30rem] h-[30rem] bg-accent-purple bottom-[-15%] right-[-10%] rounded-full"></div>
<div class="w-full max-w-md">
<div class="bg-white dark:bg-slate-50 rounded-3xl p-8 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.3)] border border-white/20">
<div class="flex flex-col items-center mb-10">
<div class="bg-primary p-2 rounded-xl mb-4 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl">auto_awesome</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-slate-900">QuizAI</h1>
<p class="text-slate-500 mt-2 text-center text-sm font-medium">Empowering the modern classroom</p>
</div>
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-semibold py-3.5 px-4 rounded-xl transition-all shadow-sm group">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAGaxrILXcxhEU_sppZvviHSNj1Qqh9kuJiav_G1PTZTvpJR5iSZ-nJE90m24YNV80ePeqG5KfiN6ecTTbAvCVoXFOCy1uFpEjEv_E0m6f6eKpSwH4mUQcMgf0tb70GZti4FUpvO_NOymSsYthU03O04JkM9FuuCG9rw8TQol748nX8TH2jyF2xmu_K68mK-7ajgsyX68zJJ8tM2FQ1Vy_LZEIRemvMuBnssXH8cwo4RUgEZns57N0f5TgO5HzBiWWm3kOtAD7tGWsI"/>
<span>Continue with Google</span>
</button>
<p class="text-[10px] text-center text-slate-400 uppercase tracking-widest font-bold">Recommended for Teachers</p>
</div>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white px-4 text-slate-400 font-bold tracking-widest">or</span>
</div>
</div>
<form action="#" class="space-y-5" onsubmit="event.preventDefault();">
<div>
<label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 text-slate-900" id="email" placeholder="name@school.edu" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-xs font-bold text-slate-700 uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary/80 transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-400 text-slate-900" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 group mt-2">
                    Log In
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 text-center">
<p class="text-slate-500 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Create Account</a>
</p>
</div>
</div>
<div class="mt-8 flex justify-center gap-6 text-slate-500 text-xs font-medium">
<a class="hover:text-white transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-white transition-colors" href="#">Terms of Service</a>
<a class="hover:text-white transition-colors" href="#">Help Center</a>
</div>
</div>

</body></html>
